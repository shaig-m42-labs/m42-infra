global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: spring-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "rigel-gateway:8080"
          - "bellatrix-auth:8081"
          - "betelgeuse-core:8082"

  - job_name: go-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - "alnitak-events:8083"
          - "saiph-worker:8084"

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
