services:
  postgres-auth:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: orion_auth
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_auth"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  postgres-core:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: orion_core
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_core"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-core-data:/var/lib/postgresql/data

  postgres-events:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: orion_events
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_events"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-events-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  nats:
    image: nats:2.11-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data

  bellatrix-auth:
    build: ../bellatrix-auth
    env_file: ./env/auth.env
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  betelgeuse-core:
    build: ../betelgeuse-core
    env_file: ./env/core.env
    depends_on:
      postgres-core:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  rigel-gateway:
    build: ../rigel-gateway
    env_file: ./env/gateway.env
    depends_on:
      bellatrix-auth:
        condition: service_healthy
      betelgeuse-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  alnitak-events:
    build: ../alnitak-events
    env_file: ./env/events.env
    depends_on:
      postgres-events:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  saiph-worker:
    build: ../saiph-worker
    env_file: ./env/worker.env
    depends_on:
      betelgeuse-core:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

volumes:
  postgres-auth-data:
  postgres-core-data:
  postgres-events-data:
  redis-data:
  nats-data:
